<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn Tập Kiểm Tra Cuối Học Kỳ II - Lịch Sử & Địa Lí 7</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            border-bottom: 2px solid var(--secondary-color);
            padding-bottom: 10px;
        }

        .quiz-info {
            text-align: center;
            margin-bottom: 30px;
            font-style: italic;
        }

        .question-card {
            margin-bottom: 25px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .question-text {
            font-weight: bold;
            margin-bottom: 12px;
            display: block;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        label {
            padding: 10px;
            border: 1px solid #eee;
            border-radius: 5px;
            cursor: pointer;
            display: block;
            transition: background 0.2s;
        }

        label:hover {
            background-color: #f0f7ff;
        }

        input[type="radio"] {
            margin-right: 10px;
        }

        button {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            background-color: #2980b9;
        }

        #result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            display: none;
        }

        /* Classes for result checking */
        .correct {
            background-color: #d4edda !important;
            border-color: var(--success-color) !important;
            color: #155724;
        }

        .incorrect {
            background-color: #f8d7da !important;
            border-color: var(--error-color) !important;
            color: #721c24;
        }

        .correct-answer-hint {
            font-size: 0.9em;
            color: var(--success-color);
            margin-top: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>ÔN TẬP LỊCH SỬ & ĐỊA LÍ 7</h1>
    <p class="quiz-info">Học kì II - Năm học 2025 - 2026. Làm lại trang để xáo trộn câu hỏi.</p>
    
    <form id="quiz-form">
        <div id="quiz-container"></div>
        <button type="button" onclick="submitQuiz()">Nộp bài & Xem kết quả</button>
    </form>

    <div id="result"></div>
</div>

<script>
    const questions = [
        { q: "Nhà Trần đã cho ban hành bộ luật nào?", a: ["Hoàng Việt luật lệ", "Quốc triều hình luật", "Hoàng triều luật lệ", "Luật Hồng Đức"], correct: 1 },
        { q: "Người có vai trò lớn dẫn đến sự thành lập của vương triều Trần là:", a: ["Trần Thủ Độ", "Trần Nhân Tông", "Trần Hưng Đạo", "Trần Thái Tông"], correct: 0 },
        { q: "Tầng lớp đông đảo nhất trong xã hội thời Trần là", a: ["Quý tộc, quan lại", "Nông dân", "Thợ thủ công, thương nhân", "Nô tì"], correct: 1 },
        { q: "Nội dung nào sau đây KHÔNG phản ánh đúng chính sách phục hồi và phát triển sản xuất nông nghiệp của nhà Trần?", a: ["Khuyến khích khai khẩn đất hoang", "Đào sông ngòi, đắp đê phòng lụt", "Cho phép tự ý giết mổ trâu, bò", "Đặt các chức quan nông nghiệp"], correct: 2 },
        { q: "Nhà Hồ được thành lập vào năm nào?", a: ["1397", "1400", "1407", "1408"], correct: 1 },
        { q: "Quốc hiệu của nước ta dưới thời Hồ là", a: ["Đại Việt", "Đại Ngu", "Đại Cồ Việt", "Đại Nam"], correct: 1 },
        { q: "Nội dung nào dưới đây KHÔNG phản ánh đúng bối cảnh dẫn đến sự thành lập của nhà Hồ?", a: ["Kinh tế phát triển, đất nước thái bình, thịnh trị", "Nhà Trần khủng hoảng, suy yếu nghiêm trọng", "Kinh tế trì trệ, nạn mất mùa xảy ra liên tiếp", "Các cuộc khởi nghĩa của nông dân nổ ra khắp nơi"], correct: 0 },
        { q: "Nhà Hồ đã dời kinh đô từ Thăng Long (Hà Nội) về", a: ["Hoa Lư (Ninh Bình)", "Phú Xuân (Huế)", "Lam Kinh (Thanh Hóa)", "Tây Đô (Thanh Hóa)"], correct: 3 },
        { q: "Ai là người lãnh đạo tối cao của cuộc khởi nghĩa Lam Sơn?", a: ["Lê Lợi", "Nguyễn Trãi", "Nguyễn Xí", "Đinh Lễ"], correct: 0 },
        { q: "Cuộc khởi nghĩa Lam Sơn thắng lợi đã mở ra một thời kì mới cho Đại Việt, đó là thời kì nào?", a: ["Thời Tiền Lê", "Thời Lê sơ", "Thời thuộc Minh", "Thời Lê trung hưng"], correct: 1 },
        { q: "Từ năm 1424 - 1425, nghĩa quân Lam Sơn đã giải phóng một vùng rộng lớn từ", a: ["Thanh Hóa tới Nghệ An", "Nam Định đến Thanh Hóa", "Thanh Hóa đến đèo Hải Vân", "Nghệ An đến đèo Hải Vân"], correct: 2 },
        { q: "Cuối năm 1427, nghĩa quân Lam Sơn đã giành chiến thắng ở", a: ["Ngọc Hồi - Đống Đa", "Tốt Động - Chúc Động", "Rạch Gầm - Xoài Mút", "Chi Lăng - Xương Giang"], correct: 3 },
        { q: "Thời Lê sơ, kinh đô Thăng Long có bao nhiêu phố phường?", a: ["36 phố phường", "63 phố phường", "16 phố phường", "61 phố phường"], correct: 0 },
        { q: "Hệ tư tưởng chiếm vị trí độc tôn dưới thời Lê sơ là", a: ["Phật giáo", "Đạo giáo", "Nho giáo", "Thiên Chúa giáo"], correct: 2 },
        { q: "Thời Lê sơ, tầng lớp nô tì giảm dần do nhà nước", a: ["Ban hành chính sách hạn nô", "Quy định rõ số lượng nô tì của quan lại", "Quy định rõ số lượng nô tì của quý tộc", "Hạn chế nghiêm ngặt việc mua bán nô tì"], correct: 3 },
        { q: "Vua Lê Thánh Tông cho biên soạn và ban hành bộ luật nào?", a: ["Luật Hồng Đức", "Luật Hình thư", "Hoàng Việt luật lệ", "Hoàng triều luật lệ"], correct: 0 },
        { q: "Năm 1428, Lê Lợi lên ngôi Hoàng đế, khôi phục lại quốc hiệu", a: ["Đại Cồ Việt", "Vạn Xuân", "Đại Việt", "Đại Ngu"], correct: 2 },
        { q: "Khí hậu Bắc Mỹ phân hóa như thế nào?", a: ["Bắc - nam và đông - tây", "Theo chiều đông - tây", "Theo độ cao", "Theo chiều bắc - nam"], correct: 0 },
        { q: "Địa hình Bắc Mỹ theo thứ tự từ Đông sang Tây, lần lượt gồm:", a: ["Núi trẻ, núi già, đồng bằng lớn", "Núi già, đồng bằng lớn, núi trẻ", "Đồng bằng lớn, núi trẻ, núi già", "Núi trẻ, đồng bằng lớn, núi già"], correct: 1 },
        { q: "Hệ thống núi Cooc-di-e nằm ở phía Tây Bắc Mỹ và chạy theo hướng nào?", a: ["Tây Bắc - Đông Nam", "Đông - Tây", "Bắc - Nam", "Đông Bắc - Tây Nam"], correct: 2 },
        { q: "Xao Pao-lô là thành phố đông dân nhất ở Nam Mỹ, thuộc quốc gia nào?", a: ["Pa-ra-goay", "Ac-hen-ti-na", "Vê-nê-xu-ê-la", "Bra-xin"], correct: 3 },
        { q: "Lễ hội Ca-na-van ở Nam Mỹ diễn ra hàng năm ở quốc gia nào?", a: ["Ac-hen-ti-na", "Pa-ra-goay", "Vê-nê-xu-ê-la", "Bra-xin"], correct: 3 },
        { q: "Ngôn ngữ chính của người dân Trung và Nam Mỹ là gì?", a: ["Tiếng Tây Ban Nha và Tiếng Bồ Đào Nha (Hệ La-tinh)", "Tiếng Bồ Đào Nha", "Ngôn ngữ hệ La-tinh", "Tiếng Anh"], correct: 2 },
        { q: "Tốc độ đô thị hóa nhanh ở Trung và Nam Mỹ là hệ quả nào?", a: ["Tốc độ đô thị hóa kinh tế nhanh", "Trình độ đô thị hóa cao", "Đô thị hóa tự phát", "Đô thị hóa có quy hoạch"], correct: 2 },
        { q: "Dân cư Trung và Nam Mỹ bao gồm những thành phần nào?", a: ["Người bản địa và người nhập cư", "Người nhập cư và người lai", "Người bản địa và người lai", "Người bản địa, người nhập cư và người lai"], correct: 3 },
        { q: "Rừng nào sau đây thuộc rừng nhiệt đới lớn nhất thế giới?", a: ["Rừng A-ma-zôn", "Rừng lá kim", "Rừng rậm thường xanh", "Rừng ôn đới"], correct: 0 },
        { q: "Rừng A-ma-zôn không có đặc điểm nào sau đây?", a: ["Đất đai màu mỡ", "Mạng lưới sông ngòi dày đặc", "Nhiều khoáng sản có trữ lượng lớn", "Sinh vật nghèo nàn"], correct: 3 },
        { q: "Diện tích rừng A-ma-zôn phần lớn tập trung ở quốc gia nào?", a: ["Bô-li-vi-a", "Cô-lôm-bi-a", "Bra-xin", "Guy-a-na"], correct: 2 },
        { q: "Mức độ đa dạng sinh học ở rừng A-ma-zôn đạt ở mức", a: ["Rất cao", "Trung bình", "Thấp", "Rất thấp"], correct: 0 },
        { q: "Châu Đại Dương nằm giữa hai đại dương nào?", a: ["Thái Bình Dương và Ấn Độ Dương", "Ấn Độ Dương và Đại Tây Dương", "Đại Tây Dương và Bắc Băng Dương", "Bắc Băng Dương và Thái Bình Dương"], correct: 0 },
        { q: "Phần lớn diện tích Châu Đại Dương nằm ở bán cầu nào?", a: ["Bán cầu Bắc", "Bán cầu Tây", "Bán cầu Nam", "Bán cầu Đông"], correct: 2 },
        { q: "Loài động vật là biểu tượng cho đất nước Ô-xtrây-li-a là gì?", a: ["Gấu trúc", "Chim cánh cụt", "Sư tử", "Căng-gu-ru"], correct: 3 }
    ];

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function renderQuiz() {
        const quizContainer = document.getElementById('quiz-container');
        shuffleArray(questions);
        
        questions.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.id = `q-card-${index}`;
            
            let optionsHTML = '';
            item.a.forEach((opt, optIndex) => {
                optionsHTML += `
                    <label id="label-${index}-${optIndex}">
                        <input type="radio" name="q${index}" value="${optIndex}">
                        ${String.fromCharCode(65 + optIndex)}. ${opt}
                    </label>
                `;
            });

            card.innerHTML = `
                <span class="question-text">Câu ${index + 1}: ${item.q}</span>
                <div class="options">
                    ${optionsHTML}
                </div>
                <div id="feedback-${index}"></div>
            `;
            quizContainer.appendChild(card);
        });
    }

    function submitQuiz() {
        let score = 0;
        const resultDiv = document.getElementById('result');
        
        questions.forEach((item, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            const feedback = document.getElementById(`feedback-${index}`);
            const card = document.getElementById(`q-card-${index}`);
            
            // Reset styles
            const labels = document.querySelectorAll(`[id^="label-${index}-"]`);
            labels.forEach(l => l.className = '');

            if (selected) {
                const userAns = parseInt(selected.value);
                if (userAns === item.correct) {
                    score++;
                    document.getElementById(`label-${index}-${userAns}`).className = 'correct';
                } else {
                    document.getElementById(`label-${index}-${userAns}`).className = 'incorrect';
                    document.getElementById(`label-${index}-${item.correct}`).className = 'correct';
                }
            } else {
                // Nếu không chọn, vẫn hiện đáp án đúng
                document.getElementById(`label-${index}-${item.correct}`).className = 'correct';
                feedback.innerHTML = `<p style="color:red; font-size:0.8em;">Bạn chưa trả lời câu này</p>`;
            }
        });

        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `Kết quả: ${score}/${questions.length} câu đúng (${((score/questions.length)*10).toFixed(2)} điểm)`;
        resultDiv.style.backgroundColor = score > (questions.length/2) ? '#d4edda' : '#f8d7da';
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    window.onload = renderQuiz;
</script>

</body>
</html>
